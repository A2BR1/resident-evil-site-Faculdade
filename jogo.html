<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Detalhes — Resident Evil</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Share+Tech+Mono&family=Barlow:ital,wght@0,300;0,400;0,600;1,400&display=swap" rel="stylesheet" />
</head>
<body class="detail-page">

  <!-- VÍDEO DE FUNDO -->
  <video
    id="bgVideo"
    autoplay
    muted
    loop
    playsinline
    preload="auto"
    style="
      position:fixed; top:0; left:0; width:100%; height:100%;
      object-fit:cover; z-index:-2; pointer-events:none;
    "
  >
    <source src="https://drive.google.com/file/d/17RyDg9klgV4WW_UKBJNjH4LTvOmByYVd/view?usp=drive_link" type="video/mp4" />
  </video>
  <!-- Overlay escuro sobre o vídeo para manter legibilidade -->
  <div style="
    position:fixed; top:0; left:0; width:100%; height:100%;
    z-index:-1; pointer-events:none;
    background: linear-gradient(
      180deg,
      rgba(10,7,3,0.72) 0%,
      rgba(10,7,3,0.60) 40%,
      rgba(10,7,3,0.72) 100%
    );
  "></div>

  <!-- HEADER -->
  <header class="site-header small-header">
    <div class="header-bg"></div>
    <div class="header-content">
      <div class="logo-area">
        <a href="index.html" class="back-btn" aria-label="Voltar ao catálogo">← VOLTAR</a>
        <span class="logo-icon">☣</span>
        <div>
          <h1 class="site-title">RESIDENT EVIL</h1>
          <p class="site-subtitle">S.T.A.R.S. DATABASE</p>
        </div>
      </div>
    </div>
  </header>

  <main class="detail-main">
    <div class="detail-container" id="detailContainer">
      <!-- Preenchido pelo JavaScript -->
      <p class="loading-msg">Carregando dados do arquivo...</p>
    </div>
  </main>

  <footer class="site-footer">
    <p>☣ Resident Evil Arquivo da Franquia &mdash; Trabalho Acadêmico &mdash; FUCAPI 2026</p>
  </footer>

  <script src="script.js"></script>
  <script src="detalhe.js"></script>
  <script src="audio.js"></script>

</body>
</html>
